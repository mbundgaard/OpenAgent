name: iOS app build

on:
  push:
    branches: [master]
    tags: ['app-v*']
    paths: ['src/app/**', '.github/workflows/ios-build.yml']
  pull_request:
    paths: ['src/app/**', '.github/workflows/ios-build.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3 (required by .NET 10 iOS SDK)
        run: sudo xcode-select -s /Applications/Xcode_26.3.app && xcodebuild -version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-ios

      - name: Run Core tests
        working-directory: src/app
        run: dotnet test OpenAgent.App.Tests/OpenAgent.App.Tests.csproj --logger "trx" --logger "console;verbosity=detailed"

      - name: Build (Debug)
        if: ${{ !startsWith(github.ref, 'refs/tags/app-v') }}
        working-directory: src/app
        run: dotnet build OpenAgent.App/OpenAgent.App.csproj -c Debug -f net10.0-ios

      - name: Import code-signing certs
        if: startsWith(github.ref, 'refs/tags/app-v')
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        if: startsWith(github.ref, 'refs/tags/app-v')
        env:
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Generate iOS AppIcon.appiconset from 1024x1024 PNG
        if: startsWith(github.ref, 'refs/tags/app-v')
        # MAUI's MauiIcon doesn't produce an iOS asset catalog for our setup,
        # so we build AppIcon.appiconset ourselves from the master 1024x1024 PNG
        # using macOS's `sips`. Apple requires 120x120 + 1024x1024 at minimum;
        # we include the full standard iPhone set for completeness.
        run: |
          set -e
          SRC="src/app/OpenAgent.App/Resources/AppIcon/appicon.png"
          XC="src/app/OpenAgent.App/Platforms/iOS/Assets.xcassets"
          ICON="$XC/AppIcon.appiconset"
          mkdir -p "$ICON"
          for size in 40 58 60 80 87 120 152 167 180 1024; do
            sips -s format png -Z "$size" "$SRC" --out "$ICON/appicon-${size}.png" >/dev/null
          done
          cat > "$ICON/Contents.json" <<'JSON'
          {
            "images": [
              { "size": "20x20", "idiom": "iphone",        "filename": "appicon-40.png",   "scale": "2x" },
              { "size": "20x20", "idiom": "iphone",        "filename": "appicon-60.png",   "scale": "3x" },
              { "size": "29x29", "idiom": "iphone",        "filename": "appicon-58.png",   "scale": "2x" },
              { "size": "29x29", "idiom": "iphone",        "filename": "appicon-87.png",   "scale": "3x" },
              { "size": "40x40", "idiom": "iphone",        "filename": "appicon-80.png",   "scale": "2x" },
              { "size": "40x40", "idiom": "iphone",        "filename": "appicon-120.png",  "scale": "3x" },
              { "size": "60x60", "idiom": "iphone",        "filename": "appicon-120.png",  "scale": "2x" },
              { "size": "60x60", "idiom": "iphone",        "filename": "appicon-180.png",  "scale": "3x" },
              { "size": "1024x1024", "idiom": "ios-marketing", "filename": "appicon-1024.png", "scale": "1x" }
            ],
            "info": { "version": 1, "author": "xcode" }
          }
          JSON
          # Top-level asset catalog manifest (required so actool recognises the bundle)
          cat > "$XC/Contents.json" <<'JSON'
          { "info": { "version": 1, "author": "xcode" } }
          JSON
          ls -la "$ICON"

      - name: Build & archive (Release, signed)
        if: startsWith(github.ref, 'refs/tags/app-v')
        working-directory: src/app
        run: |
          dotnet publish OpenAgent.App/OpenAgent.App.csproj \
            -c Release -f net10.0-ios \
            -p:ArchiveOnBuild=true \
            -p:CodesignKey="Apple Distribution" \
            -p:CodesignProvision="OpenAgent App Store"

      - name: Locate IPA
        id: ipa
        if: startsWith(github.ref, 'refs/tags/app-v')
        run: |
          IPA=$(find src/app/OpenAgent.App/bin/Release -name 'OpenAgent.App.ipa' | head -n1)
          if [ -z "$IPA" ]; then echo "No .ipa found under bin/Release"; ls -R src/app/OpenAgent.App/bin/Release; exit 1; fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Diagnose bundle (Info.plist + icon assets)
        if: startsWith(github.ref, 'refs/tags/app-v')
        run: |
          set -e
          IPA="${{ steps.ipa.outputs.path }}"
          WORK=$(mktemp -d)
          unzip -q "$IPA" -d "$WORK"
          APP=$(find "$WORK/Payload" -maxdepth 2 -name '*.app' | head -n1)
          echo "===== Info.plist ====="
          plutil -p "$APP/Info.plist" | grep -iE 'CFBundleIcon|XSAppIconAssets' || echo "(no icon-related keys)"
          echo "===== app bundle root .png files ====="
          ls -la "$APP" | grep -iE '\.png$|AppIcon' || echo "(no .png in app root)"
          echo "===== Assets.car / asset catalog presence ====="
          ls -la "$APP" | grep -iE 'Assets\.car|\.xcassets' || echo "(no Assets.car)"
          echo "===== full app bundle file list ====="
          ls -la "$APP"

      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/app-v')
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
          IPA_PATH: ${{ steps.ipa.outputs.path }}
        # apple-actions/upload-testflight-build@v1 misreports altool failures as success.
        # Call altool directly and grep for UPLOAD FAILED to fail the job on rejection.
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          OUTPUT=$(xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --output-format xml 2>&1) || EXITCODE=$?
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qiE 'UPLOAD FAILED|product-errors'; then
            echo "::error::altool rejected the upload"
            exit 1
          fi
          if [ "${EXITCODE:-0}" != "0" ]; then
            echo "::error::altool exited with $EXITCODE"
            exit "$EXITCODE"
          fi

      - name: Upload IPA artifact
        if: always() && startsWith(github.ref, 'refs/tags/app-v') && steps.ipa.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: OpenAgent-App-ipa
          path: ${{ steps.ipa.outputs.path }}
