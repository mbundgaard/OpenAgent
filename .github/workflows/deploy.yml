name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  APP_NAME: openagent-test
  PROJECT_PATH: src/agent/OpenAgent/OpenAgent.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: ga

      - name: Restore
        run: dotnet restore src/agent

      - name: Build
        run: dotnet build src/agent --no-restore --configuration Release

      - name: Test
        run: dotnet test src/agent --no-build --configuration Release
        env:
          DATA_DIR: ${{ runner.temp }}/openagent-data

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --no-build --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
